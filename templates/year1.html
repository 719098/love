<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>第一年生日</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{

background:linear-gradient(135deg,#ff9ec4,#ffb6d9,#ffd1e8);
font-family:"Microsoft JhengHei",sans-serif;
margin:0;
min-height:100vh;

}


.navbar{

background-color:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);

}


.nav-link{

font-weight:bold;
color:#d63384 !important;

}


.nav-link:hover{

color:#ff1493 !important;

}



.main-content{

text-align:center;
padding-top:130px;
padding-bottom:80px;

}



h1{

color:white;
font-size:55px;
font-weight:bold;
text-shadow:0 3px 10px rgba(0,0,0,0.2);
margin-bottom:40px;

}



.message-box{

width:80%;
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.92);
border-radius:20px;
padding:40px;
font-size:22px;
line-height:2;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
color:#333;
margin-bottom:50px;

}



.photo-area{

display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;

}



.photo-area img{

width:280px;
height:280px;
object-fit:cover;
border-radius:20px;
border:5px solid white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);

}



.photo-bottom{

margin-top:30px;

}



footer{

text-align:center;
padding:20px;
color:white;

}



@media(max-width:768px){

h1{

font-size:40px;

}


.message-box{

width:90%;
font-size:18px;

}


.photo-area img{

width:220px;
height:220px;

}

}


</style>


</head>



<body>



<nav class="navbar navbar-expand-lg fixed-top">

<div class="container-fluid justify-content-end">


<ul class="navbar-nav">


<li class="nav-item">
<a class="nav-link" href="/">首頁</a>
</li>


<li class="nav-item">
<a class="nav-link" href="/year1">第一年</a>
</li>


<li class="nav-item">
<a class="nav-link" href="/year2">第二年</a>
</li>


<li class="nav-item">
<a class="nav-link" href="/year3">第三年</a>
</li>


<li class="nav-item">
<a class="nav-link" href="/year4">第四年</a>
</li>


</ul>


</div>

</nav>




<div class="main-content">


<h1>
第一年生日 ❤️
</h1>



<div class="message-box">


第一年生日你來新竹陪我過，

<br>

也剛好是我們的第99天，也是你的20歲生日。

<br>

我第一次帶你玩了我以前生活的地方，

<br>

那時候就決定，

<br>

以後你在哪，哪就是我生活的地方。

<br>

謝謝你陪我一起創造好多第一次，

<br>

希望未來還能一起走過更多的日子 ❤️


</div>




<div class="photo-area">


<img src="/static/2.png" alt="照片2">


<img src="/static/3.png" alt="照片3">


</div>



<div class="photo-bottom">

<img src="/static/4.png" alt="照片4">

</div>



</div>



<footer>

Happy Birthday ❤️

</footer>



</body>

</html>

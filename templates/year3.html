第三年生日 ❤️
</h1>




<div class="message-box">


在一起的第三年，

<br>

這也是我最對不起妳的一年。

<br>

這一年生日我沒有辦法陪妳，

<br>

我人在大陸，後來又去了日本，

<br>

整個過程都沒有好好陪在妳身邊。

<br>

對不起，沒有給妳一個完整的生日陪伴。

<br>

但我想讓妳知道，

<br>

就算我沒有陪在妳身邊，

<br>

我也無時無刻都在想妳。

<br>

謝謝妳一直包容我，

<br>

也謝謝妳一直陪著我走到現在 ❤️


</div>

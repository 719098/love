<br>

這幾年好像都沒有好好準備禮物給妳，

<br>

所以這一次，我準備了這個網頁送給妳。

<br>

奧運也是四年一次，

<br>

我這個懶惰的人也只好四年送妳一次浪漫的禮物啦。

<br>

<br>

因為我想邀請妳一起把這篇故事繼續寫下去。

<br>

未來每一年也請妳多多指教，

<br>

也請妳繼續陪我一起書寫屬於我們兩個人的故事。

<br>

希望往後還有很多很多個生日，

<br>

<h1>
第二年生日 ❤️
</h1>




<div class="message-box">


第二年生日我們一起做了蛋糕，

<br>

也是我人生第一次做蛋糕。

<br>

雖然賣相還可以，味道也還不錯，

<br>

但我覺得我們的感情就像這個蛋糕一樣，

<br>

兩個人都很努力、很仔細地經營和維護。

<br>

每一個步驟都需要耐心，

<br>

就像我們一起走過的每一天。

<br>

後來我們也一起吃了好吃的屋馬，

<br>

留下了第二年生日最美好的回憶。

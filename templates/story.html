<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>我們的故事</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#ff9ec4,#ffb6d9,#ffd1e8);
font-family:"Microsoft JhengHei",sans-serif;
margin:0;
}

.navbar{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
}

.nav-link{
font-weight:bold;
color:#d63384 !important;
}


.main{
padding-top:120px;
padding-bottom:80px;
text-align:center;
}


h1{
color:white;
font-size:55px;
font-weight:bold;
text-shadow:0 3px 10px rgba(0,0,0,0.2);
margin-bottom:50px;
}


.story-box{

width:85%;
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.92);
border-radius:25px;
padding:40px;
margin-bottom:40px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);

}


.story-box img{

width:250px;
height:250px;
object-fit:cover;
border-radius:20px;
border:5px solid white;
margin-bottom:20px;

}


.date{

font-size:28px;
font-weight:bold;
color:#e91e63;

}


.text{

font-size:20px;
line-height:2;
color:#333;

}


.photo{

position:fixed;
top:-100px;
width:80px;
height:80px;
object-fit:cover;
border-radius:20px;
animation:fall 8s linear forwards;
z-index:-1;

}


@keyframes fall{

from{
transform:translateY(0) rotate(0deg);
}

to{
transform:translateY(120vh) rotate(360deg);
}

}


</style>

</head>


<body>


<nav class="navbar navbar-expand-lg fixed-top">

<div class="container-fluid justify-content-end">

<ul class="navbar-nav">

<li class="nav-item">
<a class="nav-link" href="/gift">首頁</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/year1">第一年</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/year2">第二年</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/year3">第三年</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/year4">第四年</a>
</li>

</ul>

</div>

</nav>


<div class="main">


<h1>
❤️ 我們的故事 ❤️
</h1>


<div id="story"></div>


</div>



<script>


const memories=[

["2023/03/19","我們開始一起走過彼此的人生","11.png"],

["2023/06/24","第一次一起過生日","12.png"],

["","","13.png"],

["","","14.png"],

["","","15.png"],

["","","16.png"],

["","","17.png"],

["","","18.png"],

["","","19.png"],

["","","20.png"],

["","","21.png"],

["","","22.png"],

["","","23.png"],

["","","24.png"],

["","","25.png"],

["","","26.png"],

["","","27.png"],

["","","28.png"],

["","","29.png"],

["","","30.png"]

];


let html="";


memories.forEach(item=>{

html+=`

<div class="story-box">

<img src="/static/${item[2]}">

<div class="date">

${item[0]}

</div>

<div class="text">

${item[1]}

</div>

</div>

`;

});


document.getElementById("story").innerHTML=html;



function createPhoto(){

let img=document.createElement("img");

img.src="/static/"+(Math.floor(Math.random()*20)+11)+".png";

img.className="photo";

img.style.left=Math.random()*100+"vw";

img.style.animationDuration=(Math.random()*5+5)+"s";


document.body.appendChild(img);


setTimeout(()=>{

img.remove();

},8000);

}


setInterval(createPhoto,1500);


</script>


</body>

</html>
